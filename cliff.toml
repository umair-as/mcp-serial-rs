# git-cliff configuration for mcp-serial-rs release notes.
#
# Commit history here is clean Conventional Commits (feat/fix/docs/test/
# chore/ci/build/style), so this config parses on commit type directly
# rather than the broader area-first patterns a messier history would need.

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.
Generated by [git-cliff](https://github.com/orhun/git-cliff) from the git
history.\n
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}]\
        {% if remote.github.owner and remote.github.repo and previous.version %} \
            (https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/{{ previous.version }}...{{ version }})\
        {%- endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | upper_first }}\
            {% if remote.github.owner and remote.github.repo %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }})){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

commit_preprocessors = [
    # Squash-merged PR bodies get pulled into commit.message; classification
    # and the changelog template both only care about the subject line, so
    # drop everything after it. This also keeps body prose (e.g. this
    # project's own "audit journal" feature) from tripping keyword matches
    # below.
    { pattern = '(?s)\n.*', replace = "" },
]

# First match wins. HTML comments force section ordering and are stripped by
# the template.
commit_parsers = [
    { message = "^Merge pull request", skip = true },
    { message = "^chore\\(release\\): prep|^build\\(version\\): bump|^docs\\(changelog\\):", skip = true },
    { message = "^style(\\(.*\\))?:", skip = true },
    { message = "^[a-z]+(\\(.*\\))?!:", group = "<!-- 0 -->Breaking Changes" },
    { message = "(?i).*(security|harden|hardening|\\bcve\\b)", group = "<!-- 1 -->Security" },
    { message = "^feat(\\(.*\\))?:", group = "<!-- 2 -->Features" },
    { message = "^fix(\\(.*\\))?:", group = "<!-- 3 -->Fixes" },
    { message = "^perf(\\(.*\\))?:", group = "<!-- 4 -->Performance" },
    { message = "^refactor(\\(.*\\))?:", group = "<!-- 5 -->Refactor" },
    { message = "^docs(\\(.*\\))?:", group = "<!-- 6 -->Documentation" },
    { message = "^test(\\(.*\\))?:", group = "<!-- 7 -->Testing" },
    { message = "^(ci|build)(\\(.*\\))?:", group = "<!-- 8 -->Build and CI" },
    { message = "^chore(\\(.*\\))?:", group = "<!-- 9 -->Chores" },
    { message = "^revert|^Revert", group = "<!-- 10 -->Reverts" },
    { message = ".*", group = "<!-- 11 -->Other" },
]

protect_breaking_commits = true
filter_commits = false
sort_commits = "oldest"
tag_pattern = "v[0-9]*"
